<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>동아리 신청</title>
  <link rel="stylesheet" href="style.css">

  <style>
.apply {
  max-width: 500px;
  margin: 50px auto;
}

.apply form {
  display: flex;
  flex-direction: column;
}

.apply label {
  display: block;
  margin-top: 20px;
  margin-bottom: 8px;
}

.apply input,
.apply textarea {
  display: block;
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  box-sizing: border-box;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.apply button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<section class="apply">

  <h2>동아리 신청</h2>

  <form action="https://forms.gle/trcE7HGDbDZtqeUb7" method="POST" target="_blank">

    <label>이름/나이/성별</label>
    <input type="text" name="entry.123456" placeholder="이름/나이/성별">

    <label>학교/전공</label>
    <input type="text" name="entry.123456" placeholder="학교/전공">

    <label>연락처</label>
    <input type="text" name="entry.123456" placeholder="연락처">

    <label>거주지 또는 집 근처 지하철역</label>
    <textarea name="entry.123456" placeholder="거주지 또는 집 근처 지하철역"></textarea>

    <label>지원동기를 자세히 작성해 주세요! (어떤 습관을 만들고 싶은지, 기대하는 바 등)</label>
    <textarea name="entry.123456" placeholder="지원동기를 자세히 작성해 주세요! (어떤 습관을 만들고 싶은지, 기대하는 바 등)"></textarea>

    <button type="submit">신청하기</button>

  </form>

</section>

</body>
</html>
